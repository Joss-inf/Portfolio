<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Portfolio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            fontFamily: {
              sans: ['-apple-system', 'BlinkMacSystemFont', 'Segoe UI', 'Roboto', 'Helvetica', 'Arial', 'sans-serif'],
            },
            colors: {
              ios: {
                primary: 'var(--ios-primary)', // Dynamic accent color
                blue: '#007AFF',
                green: '#34C759',
                indigo: '#5856D6',
                orange: '#FF9500',
                pink: '#FF2D55',
                purple: '#AF52DE',
                red: '#FF3B30',
                teal: '#5AC8FA',
                yellow: '#FFCC00',
                gray: '#8E8E93',
                gray2: '#AEAEB2',
                gray3: '#C7C7CC',
                gray4: '#D1D1D6',
                gray5: '#E5E5EA',
                gray6: '#F2F2F7',
              }
            },
            animation: {
              'app-open': 'appOpen 0.2s cubic-bezier(0.2, 0.8, 0.2, 1)',
              'app-close': 'appClose 0.2s cubic-bezier(0.2, 0.8, 0.2, 1) forwards',
              'dock-bounce': 'dockBounce 0.5s ease-in-out',
              'slide-in-right': 'slideInFromRight 0.3s cubic-bezier(0.2, 0.8, 0.2, 1) forwards',
              'slide-out-left': 'slideOutToLeft 0.3s cubic-bezier(0.2, 0.8, 0.2, 1) forwards',
              'slide-in-left': 'slideInFromLeft 0.3s cubic-bezier(0.2, 0.8, 0.2, 1) forwards',
              'slide-out-right': 'slideOutToRight 0.3s cubic-bezier(0.2, 0.8, 0.2, 1) forwards',
            },
            keyframes: {
              appOpen: {
                '0%': { opacity: '0', transform: 'scale(0.8)' },
                '100%': { opacity: '1', transform: 'scale(1)' },
              },
              appClose: {
                '0%': { opacity: '1', transform: 'scale(1)' },
                '100%': { opacity: '0', transform: 'scale(0.95)' },
              },
              dockBounce: {
                '0%, 100%': { transform: 'translateY(0)' },
                '50%': { transform: 'translateY(-10px)' },
              },
              slideInFromRight: {
                '0%': { transform: 'translateX(100%)', opacity: '0' },
                '100%': { transform: 'translateX(0)', opacity: '1' },
              },
              slideOutToLeft: {
                '0%': { transform: 'translateX(0)', opacity: '1' },
                '100%': { transform: 'translateX(-100%)', opacity: '0' },
              },
              slideInFromLeft: {
                '0%': { transform: 'translateX(-100%)', opacity: '0' },
                '100%': { transform: 'translateX(0)', opacity: '1' },
              },
              slideOutToRight: {
                '0%': { transform: 'translateX(0)', opacity: '1' },
                '100%': { transform: 'translateX(100%)', opacity: '0' },
              },
            },
            willChange: {
              'transform-opacity': 'transform, opacity',
            },
            scrollBehavior: {
              smooth: 'smooth',
            },
          },
        },
      }
    </script>
    <style>
      /* CSS Variables */
      :root {
        --ios-primary: #007AFF; /* Default Blue */
        
      }
        
      /* Custom scrollbar for that sleek feel */
      ::-webkit-scrollbar {
        width: 3px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: rgba(150, 150, 150, 0.5);
        border-radius: 3px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: rgba(150, 150, 150, 0.8);
      }

      /* Global Text Sharpening Tricks */
      html{
        scrollbar-width: thin;
      }
      body {
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        text-rendering: optimizeLegibility;
        /* Helps with font weight consistency on some screens */
        -webkit-text-size-adjust: 100%; 
        /* Firefox scrollbar styling */
      
        scrollbar-color: rgba(150, 150, 150, 0.5) transparent;
        scroll-behavior: smooth;
      }
      
      /* Ensure transforms don't blur text */
      * {
        backface-visibility: hidden; 
        -webkit-backface-visibility: hidden;
      }
  
      /* Custom utility for will-change: filter */
      .will-change-filter {
        will-change: filter;
      }
      
      /* Skeleton Wave Animation */
      @keyframes wave {
        0% {
          background-position: -200px 0;
        }
        100% {
          background-position: calc(200px + 100%) 0;
        }
      }

      .skeleton-wave {
        background-color: #D1D1D6; /* ios-gray4 */
        background-image: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
        background-size: 200px 100%;
        background-repeat: no-repeat;
        animation: wave 2s infinite linear;
      }
      
      /* Swiper Pagination Customization */
      .swiper-pagination-bullet {
        background: rgba(255, 255, 255, 0.5) !important;
        opacity: 1 !important;
      }
      .swiper-pagination-bullet-active {
        background: #ffffff !important;
        width: 20px !important;
        border-radius: 5px !important;
        transition: all 0.3s ease;
      }
    </style>


</head>
<body class="bg-black text-white antialiased">
  <main id="root" class="h-screen w-screen overflow-hidden"></main>
   <script type="module" src="index.tsx"></script>
</body>
</html>
